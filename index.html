<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ukrainos karo žemėlapiai pagal metus</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    :root {
      --gap: 16px;
      --panel-width: 290px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7f9;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    .map-area {
      position: fixed;
      inset: 0;
      background: #fff;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #e9edf2;
    }

    .panel {
      position: fixed;
      top: var(--gap);
      right: var(--gap);
      width: var(--panel-width);
      max-height: calc(100vh - (var(--gap) * 2));
      overflow: auto;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(4px);
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
      z-index: 1000;
    }

    .panel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      border: 1px solid #d9ddff;
      font-size: 12px;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: #444;
      line-height: 1.45;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #cfd6ff;
      background: #f2f5ff;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }

    button:hover {
      background: #e9eeff;
    }

    textarea {
      width: 100%;
      margin-top: 10px;
      min-height: 120px;
      border-radius: 10px;
      border: 1px solid #ddd;
      padding: 10px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      resize: vertical;
    }

    .legend {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: #fafafa;
      border: 1px solid #e5e5e5;
      font-size: 12px;
      line-height: 1.5;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .legend-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #6aa84f;
      flex: 0 0 auto;
    }

    .legend-icon {
      width: 22px;
      height: 22px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .popup-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.25;
    }

    .popup-meta {
      font-size: 12px;
      color: #555;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .popup-text {
      font-size: 13px;
      line-height: 1.5;
    }

    .leaflet-popup-content {
      min-width: 260px;
      max-width: 340px;
    }

    .leaflet-control-attribution {
      font-size: 11px;
    }

    /* Svarbiausia dalis:
       markeris inkaruojamas ties vietovės tašku,
       o battle ikona tik vizualiai nupiešiama dešinėje. */
    .battle-wrapper {
      position: relative;
      width: 46px;
      height: 24px;
      overflow: visible;
      pointer-events: none;
    }

    .battle-hit {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      background-image: url("assets/battle.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      pointer-events: auto;
      cursor: pointer;
    }

    .battle-hit.large {
      width: 30px;
      height: 30px;
      left: 12px;
    }

    .battle-hit.small {
      width: 18px;
      height: 18px;
      left: 12px;
    }

    @media (max-width: 980px) {
      :root {
        --panel-width: auto;
      }

      .panel {
        top: auto;
        left: var(--gap);
        right: var(--gap);
        bottom: var(--gap);
        width: auto;
        max-height: 42vh;
      }
    }
  </style>
</head>

<body>
  <div class="map-area">
    <div id="map"></div>
  </div>

  <div class="panel">
    <h3>Metai</h3>

    <select id="yearSelect">
      <option value="2022" selected>2022</option>
      <option value="2023">2023</option>
      <option value="2024">2024</option>
      <option value="2025">2025</option>
      <option value="2026">2026</option>
    </select>

    <div class="badge" id="status">Rodomas: 2022</div>

    <button id="fitBtn">Rodyti visą žemėlapį</button>
    <button id="debugBtn">Debug: OFF</button>

    <div class="legend">
      <div><b>Legenda</b></div>
      <div class="legend-row">
        <span class="legend-dot"></span>
        <span>Vietovės taškas žemėlapyje</span>
      </div>
      <div class="legend-row">
        <img class="legend-icon" src="assets/battle.png" alt="Battle" />
        <span>Mūšio / įvykio ikona dešinėje nuo vietovės</span>
      </div>
    </div>

    <div class="note">
      Gali laisvai <b>zoominti</b> ir <b>stumdyti</b> žemėlapį.
      <br><br>
      Paspaudus ant <b>battle</b> ikonos atsidarys detalus įvykio aprašymas.
      <br><br>
      Debug režimas paliktas koordinačių tikslinimui.
    </div>

    <textarea
      id="codeOut"
      readonly
      placeholder="Kai Debug ON ir paspausi žemėlapyje – čia atsiras koordinatės."
    ></textarea>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const yearSelect = document.getElementById("yearSelect");
    const status = document.getElementById("status");
    const debugBtn = document.getElementById("debugBtn");
    const fitBtn = document.getElementById("fitBtn");
    const codeOut = document.getElementById("codeOut");

    const map = L.map("map", {
      crs: L.CRS.Simple,
      zoomControl: true,
      minZoom: -5,
      maxZoom: 5,
      wheelPxPerZoomLevel: 120
    });

    let overlay = null;
    let currentBounds = null;
    let DEBUG = false;

    const eventLayer = L.layerGroup().addTo(map);
    const debugPointsLayer = L.layerGroup().addTo(map);

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error(`Nepavyko užkrauti: ${src}`));
        img.src = src;
      });
    }

    function fitToImage() {
      if (!currentBounds) return;
      map.fitBounds(currentBounds, {
        padding: [20, 20],
        animate: false
      });
    }

    function clearDebug() {
      debugPointsLayer.clearLayers();
      codeOut.value = "";
    }

    function createBattleDivIcon(size = "normal") {
      const sizeClass = size === "large" ? "large" : size === "small" ? "small" : "normal";

      return L.divIcon({
        className: "",
        html: `
          <div class="battle-wrapper">
            <div class="battle-hit ${sizeClass}"></div>
          </div>
        `,
        iconSize: [46, 24],
        iconAnchor: [0, 12],
        popupAnchor: [24, -10]
      });
    }

    function popupHtml(eventItem) {
      const places = eventItem.locations.map(item => item.place).join(", ");
      const categoryMap = {
        battle: "Mūšis",
        siege: "Apgultis",
        massacre: "Žudynės",
        strike: "Smūgis",
        offensive: "Puolimas / operacija",
        liberation: "Išlaisvinimas",
        frontline: "Fronto kovos",
        naval: "Jūrinis / pakrantės įvykis",
        sabotage: "Sabotažas / sprogimas"
      };

      const categoryLabel = categoryMap[eventItem.type] || "Istorinis įvykis";

      return `
        <div class="popup-title">${eventItem.title}</div>
        <div class="popup-meta">
          <b>Metai:</b> ${eventItem.year}<br>
          <b>Tipas:</b> ${categoryLabel}<br>
          <b>Vieta:</b> ${places}
        </div>
        <div class="popup-text">${eventItem.description}</div>
      `;
    }

    function addEventMarker(eventItem, loc) {
      // Čia markeris dedamas tiksliai ant žalio taško koordinatės.
      // Ikona piešiama dešinėje per CSS, nekeičiant geografinės vietos.
      const marker = L.marker([loc.y, loc.x], {
        icon: createBattleDivIcon(eventItem.size || "normal"),
        title: eventItem.title
      });

      marker.bindPopup(popupHtml(eventItem), {
        maxWidth: 340
      });

      marker.addTo(eventLayer);
    }

    function drawEvents(year) {
      eventLayer.clearLayers();

      const selectedEvents = HISTORICAL_EVENTS.filter(item => item.year === year);

      selectedEvents.forEach(eventItem => {
        eventItem.locations.forEach(loc => addEventMarker(eventItem, loc));
      });
    }

    async function loadYear(year) {
      status.textContent = `Rodomas: ${year}`;

      const imgUrl = `assets/${year}.jpg?v=${Date.now()}`;

      try {
        const img = await loadImage(imgUrl);

        const w = img.naturalWidth;
        const h = img.naturalHeight;

        currentBounds = [[0, 0], [h, w]];

        if (overlay) {
          map.removeLayer(overlay);
        }

        overlay = L.imageOverlay(imgUrl, currentBounds).addTo(map);

        map.setMaxBounds([
          [-h * 0.2, -w * 0.2],
          [h * 1.2, w * 1.2]
        ]);

        fitToImage();
        clearDebug();
        drawEvents(year);
      } catch (err) {
        console.error(err);
        alert(err.message);
      }
    }

    map.on("click", (e) => {
      if (!DEBUG) return;

      const x = Math.round(e.latlng.lng);
      const y = Math.round(e.latlng.lat);

      L.circleMarker([y, x], {
        radius: 4,
        color: "#ff0000",
        weight: 2,
        fillColor: "#ff0000",
        fillOpacity: 0.8
      }).addTo(debugPointsLayer);

      codeOut.value += `x: ${x}, y: ${y}\n`;
    });

    debugBtn.addEventListener("click", () => {
      DEBUG = !DEBUG;
      debugBtn.textContent = `Debug: ${DEBUG ? "ON" : "OFF"}`;
      clearDebug();
    });

    fitBtn.addEventListener("click", fitToImage);

    yearSelect.addEventListener("change", () => {
      loadYear(yearSelect.value);
    });

    window.addEventListener("resize", () => {
      setTimeout(() => map.invalidateSize(), 50);
    });
